<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 리뷰 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js';document.head.appendChild(s);"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#F5F6FA; --surface:#FFFFFF; --surface-2:#FAFBFD; --border:#E3E6EE;
    --text:#191B26; --text-dim:#6B7280; --text-faint:#9CA3AF;
    --primary:#0F1E3D; --primary-dim:#1C2F58; --primary-tint:#EBEEF4;
    --teal:#0C8C7D; --teal-tint:#E6F5F3; --amber:#C2760C; --amber-tint:#FBF0DF;
    --red:#C93C3C; --red-tint:#FBEAEA;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(20,22,40,0.04), 0 4px 16px rgba(20,22,40,0.04);
    --font-sans:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font-sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:var(--font-sans);}
  body::before{content:''; display:block; height:3px; width:100%; background:linear-gradient(90deg, var(--primary) 0%, var(--primary) 60%, #7C8AAE 100%); position:sticky; top:0; z-index:50;}

  .topbar{position:sticky; top:3px; z-index:40; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .topbar-title h1{font-size:15px; font-weight:700; margin:0; letter-spacing:0.02em; color:var(--primary);}
  .topbar-title .sub{font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono);}
  .topbar-controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .btn{display:inline-flex; align-items:center; gap:6px; border-radius:var(--radius-sm); border:1px solid var(--border); padding:7px 12px; font-size:12.5px; font-weight:600; background:var(--surface); color:var(--text); transition:all .12s ease;}
  .btn:hover{background:var(--surface-2); border-color:#D3D7E2;}
  .btn-primary{background:var(--primary); border-color:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-dim);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .spin{display:inline-block; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .filterbar{background:var(--surface); border-bottom:1px solid var(--border); padding:10px 22px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .filterbar .fb-group{display:flex; align-items:center; gap:6px;}
  .filterbar label{font-size:11.5px; font-weight:700; color:var(--text-dim);}
  .filterbar input[type=date]{border:1px solid var(--border); border-radius:6px; padding:5px 7px; font-size:12px; font-family:var(--font-mono);}
  .filterbar select{border:1px solid var(--border); border-radius:6px; padding:5px 7px; font-size:12px; max-width:260px;}

  .banner{padding:9px 22px; font-size:13px; display:none; align-items:center; gap:8px; border-bottom:1px solid var(--border);}
  .banner.show{display:flex;}
  .banner.error{background:var(--red-tint); color:#8f2323;}
  .banner.ok{background:var(--teal-tint); color:#0a5a4f;}

  .tabs{display:flex; gap:2px; padding:0 22px; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto;}
  .tab-btn{border:none; background:transparent; padding:11px 16px; font-size:13px; font-weight:600; color:var(--text-faint); border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap;}
  .tab-btn.active{color:var(--primary); border-bottom-color:var(--primary);}
  .tab-panel{display:none; padding:22px; max-width:1400px; margin:0 auto;}
  .tab-panel.active{display:block;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:18px; box-shadow:var(--shadow);}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px;}
  .card-head h2{font-size:14px; font-weight:700; margin:0; outline:none;}
  .card-head h2[contenteditable]:hover{background:var(--surface-2); border-radius:4px; padding:2px 4px; margin:-2px -4px;}
  .card-head .hint{font-size:11px; color:var(--text-faint);}

  /* rich text comment editor */
  .editor-toolbar{display:flex; gap:4px; margin-bottom:8px;}
  .editor-toolbar button{border:1px solid var(--border); background:var(--surface-2); border-radius:6px; width:28px; height:28px; font-size:12px; font-weight:700;}
  .editor-toolbar button.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .editor-toolbar select{border:1px solid var(--border); border-radius:6px; font-size:11.5px; padding:2px 4px;}
  .comment-box{min-height:90px; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:13px; outline:none; background:#fff;}
  .comment-box:focus{border-color:var(--primary);}
  .comment-box:empty:before{content:attr(data-placeholder); color:var(--text-faint);}

  .table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-sm);}
  table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:600px;}
  thead th{background:var(--surface-2); color:var(--text-dim); font-weight:700; text-align:right; padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap;}
  thead th:first-child{text-align:left;}
  tbody td{padding:7px 10px; text-align:right; border-bottom:1px solid #EEF0F5; font-family:var(--font-mono); white-space:nowrap; cursor:pointer;}
  tbody td:first-child{text-align:left; font-family:var(--font-sans); cursor:default;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.total-row td{font-weight:700; background:var(--surface-2); cursor:default;}
  td.hl{box-shadow:inset 0 0 0 2px var(--red); background:var(--red-tint);}
  .excluded-tag{display:inline-flex; align-items:center; gap:4px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:11.5px; margin:2px;}
  .excluded-tag button{border:none; background:none; color:var(--text-faint); font-size:12px; padding:0;}

  .img-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
  .img-slot{border:1.5px dashed var(--border); border-radius:10px; background:var(--surface-2); aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; text-align:center; padding:8px;}
  .img-slot.dragover{border-color:var(--primary); background:var(--primary-tint);}
  .img-slot img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
  .img-slot .placeholder{font-size:11px; color:var(--text-faint); padding:0 6px;}
  .img-slot .name-label{position:absolute; bottom:0; left:0; right:0; background:rgba(15,30,61,0.75); color:#fff; font-size:10.5px; padding:4px 6px; text-align:center; z-index:2;}
  .img-slot .remove-btn{position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:11px; z-index:3; display:none;}
  .img-slot:hover .remove-btn{display:block;}
  .img-slot input[type=file]{display:none;}

  .empty-state{text-align:center; padding:30px 20px; color:var(--text-faint); font-size:12.5px;}
  .chart-wrap{height:380px; position:relative;}

  .modal-overlay{display:none; position:fixed; inset:0; background:rgba(20,22,40,0.45); z-index:100; align-items:center; justify-content:center; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff; border-radius:14px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto;}
  .modal-head{padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{margin:0; font-size:15px;}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:700; margin-bottom:5px;}
  .field .desc{font-size:11px; color:var(--text-faint); margin-top:4px;}
  .field input[type=text],.field select{width:100%; padding:8px 9px; border:1px solid var(--border); border-radius:8px; font-size:13px;}
  .map-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .status-line{font-size:11.5px; margin-top:6px; display:none;}
  .status-line.show{display:block;}
  .status-line.error{color:#8f2323;}
  .status-line.ok{color:#0a5a4f;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <h1>월간 리뷰 대시보드</h1>
    <div class="sub" id="statusLabel">불러오는 중...</div>
  </div>
  <div class="topbar-controls">
    <button class="btn" id="reloadStateBtn">↻ 불러오기</button>
    <button class="btn" id="pdfBtn">📄 PDF</button>
    <button class="btn" id="settingsBtn">⚙️ 설정</button>
    <button class="btn" id="syncBtn">⟲ Sync</button>
    <button class="btn btn-primary" id="saveBtn">☁️ 저장</button>
  </div>
</div>

<div class="filterbar">
  <div class="fb-group">
    <label>리뷰 기간</label>
    <input type="date" id="rangeStart">
    <span>~</span>
    <input type="date" id="rangeEnd">
  </div>
  <div class="fb-group">
    <label>제외할 캠페인</label>
    <select id="excludeSelect"><option value="">-- 캠페인 선택 --</option></select>
  </div>
  <div class="fb-group" id="excludedTags"></div>
</div>

<div class="banner" id="banner"></div>

<div class="tabs" id="tabBar">
  <button class="tab-btn active" data-tab="summary">Summary</button>
</div>

<div id="tabPanels"></div>

<!-- ===================== SETTINGS MODAL ===================== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head"><h3>설정</h3><button class="btn" id="modalClose" style="padding:4px 8px;">✕</button></div>
    <div class="modal-body">
      <div class="field">
        <label>Raw 데이터 CSV 게시 URL</label>
        <input type="text" id="cfg-csvUrl">
      </div>
      <div class="field">
        <label>Apps Script 웹앱 URL</label>
        <input type="text" id="cfg-appsScriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="desc">Apps Script를 배포하고 나온 웹앱 URL을 여기 붙여넣으세요. (이 값은 이 브라우저에만 저장됩니다 — 다른 사람과 공유하려면 코드 상단의 APPS_SCRIPT_URL 기본값을 직접 채워서 배포하세요.)</div>
      </div>
      <button class="btn" id="testConnBtn" style="width:100%; justify-content:center;">연결 테스트</button>
      <div class="status-line" id="connStatus"></div>
      <div id="mappingSection" style="display:none; margin-top:16px;">
        <div class="field"><label>컬럼 매핑</label></div>
        <div class="map-grid" id="mapGrid"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="modalCancel">취소</button>
      <button class="btn btn-primary" id="modalSave">저장하고 동기화</button>
    </div>
  </div>
</div>

<script>
/* ===========================================================
   기본값 — CSV는 기존 대시보드와 동일. Apps Script URL은 배포 후 여기 채워두면
   다른 사람이 새 브라우저로 열어도 바로 연결됩니다 (설정에서 입력해도 되지만,
   그러면 그 사람 브라우저에만 저장되어 다른 사람은 또 입력해야 해요).
=========================================================== */
const DEFAULT_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTR5Nd2gEUhxVZEGxr5Hl3EiteaWx1yL6Nio1iRk3Y4dKAofaGzMD1PbKBjF4vjlxzXoeluwVCAu9I7/pub?gid=1112034945&single=true&output=csv';
const APPS_SCRIPT_URL = ''; // ← Apps Script 배포 후 웹앱 URL을 여기 붙여넣으세요

const LS = { config:'mrDash_config' };
function loadJSON(key, fallback){ try{ const v = localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

let CONFIG = loadJSON(LS.config, { csvUrl: DEFAULT_CSV_URL, appsScriptUrl: APPS_SCRIPT_URL, fieldMap:{} });
if(!CONFIG.appsScriptUrl && APPS_SCRIPT_URL) CONFIG.appsScriptUrl = APPS_SCRIPT_URL;

const REQUIRED_FIELDS = [
  {key:'date', label:'날짜 (Date)'}, {key:'brand', label:'브랜드 (Brand)'},
  {key:'country', label:'국가 (Country)'}, {key:'media', label:'매체 (Media)'},
  {key:'objective', label:'목적 (Objective)'}, {key:'creativeType', label:'소재유형 (Creative Type)'},
  {key:'influencer', label:'인플루언서 (Influencer) — 선택'}, {key:'campaign', label:'캠페인 (Campaign)'},
  {key:'spent', label:'지출 (Spent)'}, {key:'impression', label:'노출 (Impression)'},
  {key:'click', label:'클릭 (Click)'}, {key:'landingPageViews', label:'LPV — 선택'},
  {key:'view', label:'조회 (View)'}
];

let RAWROWS = [], RAWHEADERS = [];
let STATE = { dateRange:{start:'',end:''}, excludedCampaigns:[], tableTitles:{}, comments:{}, highlights:{}, images:{} };
let charts = {};

/* ===========================================================
   유틸
=========================================================== */
function num(row, key){ const col=CONFIG.fieldMap[key]; if(!col) return 0; const v=row[col]; if(v===undefined||v===null||v==='') return 0; const n=parseFloat(String(v).replace(/[,₩\s]/g,'')); return isNaN(n)?0:n; }
function getDate(row){ const col=CONFIG.fieldMap.date; if(!col) return null; const raw=row[col]; if(!raw) return null; const d=new Date(raw); return isNaN(d.getTime())?null:d; }
function safeDiv(a,b){ return b?a/b:0; }
function fmtInt(n){ return Math.round(n||0).toLocaleString('ko-KR'); }
function fmtWon(n){ return '₩'+fmtInt(n); }
function fmtPct(n,d=2){ return isFinite(n)?(n*100).toFixed(d)+'%':'-'; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toDateInput(d){ if(!(d instanceof Date)||isNaN(d)) return ''; return d.toISOString().slice(0,10); }
function mondayOf(d){ const dt=new Date(d); const day=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-day); dt.setHours(0,0,0,0); return dt; }
function weekKey(d){ return toDateInput(mondayOf(d)); }
function weekLabel(key){ const s=new Date(key); const e=new Date(s); e.setDate(s.getDate()+6); const f=dt=>`${dt.getMonth()+1}.${dt.getDate()}`; return `${f(s)}~${f(e)}`; }
function uniqueVals(rows, col){ const s=new Set(); rows.forEach(r=>{ const v=r[col]; if(v!==undefined&&v!==null&&v!=='') s.add(String(v)); }); return Array.from(s).sort(); }

function inRange(row, range){
  if(!range || (!range.start && !range.end)) return true;
  const d = getDate(row); if(!d) return true;
  if(range.start && d < new Date(range.start)) return false;
  if(range.end){ const end=new Date(range.end); end.setHours(23,59,59,999); if(d>end) return false; }
  return true;
}
function baseRows(){
  const campCol = CONFIG.fieldMap.campaign;
  return RAWROWS.filter(r => inRange(r, STATE.dateRange) && !(campCol && STATE.excludedCampaigns.includes(String(r[campCol]))));
}
function aggregate(rows){
  let spent=0, impression=0, click=0, lpv=0, view=0;
  for(const r of rows){ spent+=num(r,'spent'); impression+=num(r,'impression'); click+=num(r,'click'); lpv+=num(r,'landingPageViews'); view+=num(r,'view'); }
  return { spent, impression, click, lpv, view,
    ctr: safeDiv(click,impression), cpc: safeDiv(spent,click), cpm: safeDiv(spent,impression)*1000,
    vtr: safeDiv(view,impression), cpv: safeDiv(spent,view) };
}
function groupBy(rows, keyFn){
  const map = new Map();
  for(const r of rows){ const k = typeof keyFn==='function'?keyFn(r):String(r[keyFn]??'(빈값)'); if(!map.has(k)) map.set(k,[]); map.get(k).push(r); }
  return map;
}
const METRIC_HEADERS = ['Spent','Imps.','Click','LPV','CTR','CPC','CPM','View','VTR','CPV'];
function metricCells(a){ return [fmtWon(a.spent), fmtInt(a.impression), fmtInt(a.click), fmtInt(a.lpv), fmtPct(a.ctr), fmtInt(a.cpc), fmtInt(a.cpm), fmtInt(a.view), fmtPct(a.vtr), fmtInt(a.cpv)]; }

/* ===========================================================
   표 렌더 (클릭해서 셀 강조 토글 가능)
=========================================================== */
function buildTable(tableId, rows, keyFnOrCol, dimLabel){
  const groups = groupBy(rows, keyFnOrCol);
  const keys = Array.from(groups.keys()).filter(k=>k!=='?'&&k!=='(빈값)'&&k!=='').sort();
  const hl = new Set(STATE.highlights[tableId] || []);
  let html = `<thead><tr><th>${esc(dimLabel)}</th>${METRIC_HEADERS.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  keys.forEach((k,ri)=>{
    const a = aggregate(groups.get(k));
    const cells = metricCells(a);
    html += `<tr><td>${esc(k)}</td>${cells.map((c,ci)=>`<td data-table="${tableId}" data-cell="${ri}-${ci}" class="${hl.has(ri+'-'+ci)?'hl':''}">${c}</td>`).join('')}</tr>`;
  });
  const tot = aggregate(keys.flatMap(k=>groups.get(k)));
  html += `<tr class="total-row"><td>총계</td>${metricCells(tot).map(c=>`<td>${c}</td>`).join('')}</tr></tbody>`;
  return html;
}
document.addEventListener('click', e=>{
  const td = e.target.closest('td[data-cell]');
  if(!td) return;
  const tableId = td.dataset.table, cell = td.dataset.cell;
  if(!STATE.highlights[tableId]) STATE.highlights[tableId] = [];
  const arr = STATE.highlights[tableId];
  const pos = arr.indexOf(cell);
  if(pos===-1){ arr.push(cell); td.classList.add('hl'); }
  else{ arr.splice(pos,1); td.classList.remove('hl'); }
});

/* ===========================================================
   리치 텍스트 코멘트 에디터
=========================================================== */
function buildCommentEditor(tabKey){
  const html = STATE.comments[tabKey] || '';
  return `
  <div class="editor-toolbar">
    <button type="button" data-cmd="bold" title="굵게"><b>B</b></button>
    <select data-cmd="fontSize" title="글씨 크기">
      <option value="2">작게</option>
      <option value="3" selected>보통</option>
      <option value="5">크게</option>
      <option value="7">아주 크게</option>
    </select>
  </div>
  <div class="comment-box" contenteditable="true" data-comment-key="${tabKey}" data-placeholder="코멘트를 입력하세요...">${html}</div>`;
}
document.addEventListener('click', e=>{
  const btn = e.target.closest('.editor-toolbar button');
  if(!btn) return;
  const box = btn.closest('.card').querySelector('.comment-box');
  box.focus();
  document.execCommand(btn.dataset.cmd, false, null);
});
document.addEventListener('change', e=>{
  const sel = e.target.closest('.editor-toolbar select[data-cmd="fontSize"]');
  if(!sel) return;
  const box = sel.closest('.card').querySelector('.comment-box');
  box.focus();
  document.execCommand('fontSize', false, sel.value);
});
document.addEventListener('input', e=>{
  const box = e.target.closest('.comment-box[data-comment-key]');
  if(!box) return;
  STATE.comments[box.dataset.commentKey] = box.innerHTML;
});

/* ===========================================================
   이미지 슬롯 (붙여넣기 / 드래그앤드롭 / 파일선택)
=========================================================== */
const imageCache = {}; // key -> base64 dataURL (세션 캐시)

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 480;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

   차트 (기존 대시보드와 동일한 시작/종료 마커 시스템)
=========================================================== */
function chartsAvailable(){ return typeof Chart !== 'undefined'; }
function showChartFallback(canvas,msg){ if(!canvas) return; canvas.parentElement.innerHTML = `<div class="empty-state">${esc(msg)}</div>`; }
const MARK_START_COLOR = '#0F1E3D', MARK_END_COLOR = '#9CA3AF';
function drawPill(ctx,x,y,text,bg,align){
  ctx.font='10px Pretendard, sans-serif';
  const padX=6,h=16; const textW=ctx.measureText(text).width; const w=textW+padX*2;
  const bx = align==='right' ? x-w : x; const r=3;
  ctx.beginPath(); ctx.moveTo(bx+r,y); ctx.arcTo(bx+w,y,bx+w,y+h,r); ctx.arcTo(bx+w,y+h,bx,y+h,r); ctx.arcTo(bx,y+h,bx,y,r); ctx.arcTo(bx,y,bx+w,y,r); ctx.closePath();
  ctx.fillStyle=bg; ctx.fill();
  ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(text, bx+padX, y+h/2);
  return h;
}
const markerLinePlugin = {
  id:'markerLines',
  afterDraw(chart){
    const opts = chart.options.plugins && chart.options.plugins.markerLines;
    if(!opts || !opts.markers || !opts.markers.length) return;
    const {ctx, chartArea} = chart;
    const meta = chart.getDatasetMeta(0);
    if(!meta || !meta.data) return;
    ctx.save(); ctx.font='10px Pretendard, sans-serif';
    const byIndex = new Map();
    opts.markers.forEach(m=>{ if(!byIndex.has(m.index)) byIndex.set(m.index,[]); byIndex.get(m.index).push(m); });
    const indexX = new Map();
    byIndex.forEach((_,index)=>{ const p=meta.data[index]; if(p) indexX.set(index,p.x); });
    byIndex.forEach((entries,index)=>{
      const x=indexX.get(index); if(x===undefined||!isFinite(x)||x<chartArea.left||x>chartArea.right) return;
      const hasStart = entries.some(e=>e.kind==='시작');
      ctx.beginPath(); ctx.setLineDash([4,3]); ctx.strokeStyle = hasStart?MARK_START_COLOR:MARK_END_COLOR; ctx.lineWidth=1;
      ctx.moveTo(x,chartArea.top); ctx.lineTo(x,chartArea.bottom); ctx.stroke(); ctx.setLineDash([]);
    });
    let boxes=[];
    byIndex.forEach((entries,index)=>{
      const x=indexX.get(index); if(x===undefined||!isFinite(x)||x<chartArea.left||x>chartArea.right) return;
      entries.forEach(e=>{
        const text=`${e.name} ${e.kind}`; const w=ctx.measureText(text).width+12;
        const overflowsRight=(x+4+w)>chartArea.right; const align=overflowsRight?'right':'left';
        const left = align==='right' ? x-4-w : x+4;
        boxes.push({x,text,color:e.kind==='시작'?MARK_START_COLOR:MARK_END_COLOR,w,align,left,right:left+w});
      });
    });
    boxes.sort((a,b)=>a.left-b.left);
    const laneRightEdge=[]; const boxH=16, gap=3, hGap=4;
    boxes.forEach(b=>{
      let lane = laneRightEdge.findIndex(edge=>b.left>edge+hGap);
      if(lane===-1){ lane=laneRightEdge.length; laneRightEdge.push(-Infinity); }
      laneRightEdge[lane]=b.right; b.lane=lane;
    });
    boxes.forEach(b=>{ const y=chartArea.top+4+b.lane*(boxH+gap); drawPill(ctx, b.align==='right'?b.x-4:b.x+4, y, b.text, b.color, b.align); });
    ctx.restore();
  }
};
try{ if(typeof Chart!=='undefined') Chart.register(markerLinePlugin); }catch(e){}

function computeGroupRuns(rows, primaryCol, secondaryCol, maxGroups){
  maxGroups = maxGroups||4;
  if(!primaryCol) return [];
  const primaryGroups = groupBy(rows, primaryCol);
  let runs=[];
  primaryGroups.forEach((grp,pname)=>{
    if(!pname||pname==='(빈값)') return;
    if(secondaryCol){
      const subGroups = groupBy(grp, secondaryCol);
      const subKeys = Array.from(subGroups.keys()).filter(k=>k&&k!=='(빈값)');
      const multiple = subKeys.length>1;
      subKeys.forEach(skey=>{
        const subRows = subGroups.get(skey);
        const dates = subRows.map(getDate).filter(Boolean).map(toDateInput).sort();
        if(dates.length===0) return;
        runs.push({ name: multiple?`${pname} (${skey})`:pname, start:dates[0], end:dates[dates.length-1], spend: aggregate(subRows).spent });
      });
    } else {
      const dates = grp.map(getDate).filter(Boolean).map(toDateInput).sort();
      if(dates.length===0) return;
      runs.push({ name:pname, start:dates[0], end:dates[dates.length-1], spend: aggregate(grp).spent });
    }
  });
  runs.sort((a,b)=>b.spend-a.spend);
  return runs.slice(0,maxGroups);
}
function buildMarkerOpts(runs, days){
  if(runs.length===0||days.length===0) return [];
  const globalLast = days[days.length-1];
  const markers=[];
  runs.forEach(r=>{
    const si=days.indexOf(r.start), ei=days.indexOf(r.end);
    if(si>=0) markers.push({index:si, name:r.name, kind:'시작'});
    if(ei>=0 && ei!==si && r.end!==globalLast) markers.push({index:ei, name:r.name, kind:'종료'});
  });
  return markers;
}
function renderTrendChart(canvasId, chartKey, rows, primaryMarkerCol, secondaryMarkerCol, fallbackMarkerCol){
  try{
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    if(!chartsAvailable()){ showChartFallback(canvas, '차트 라이브러리를 불러오지 못했습니다.'); return; }
    const dayMap = groupBy(rows, r=>{ const d=getDate(r); return d?toDateInput(d):'?'; });
    const days = Array.from(dayMap.keys()).filter(k=>k!=='?').sort();
    if(days.length===0){ showChartFallback(canvas, '표시할 일자별 데이터가 없어요.'); return; }
    const spend = days.map(d=>aggregate(dayMap.get(d)).spent);
    const ctr = days.map(d=>aggregate(dayMap.get(d)).ctr*100);
    const vtr = days.map(d=>aggregate(dayMap.get(d)).vtr*100);
    let runs = computeGroupRuns(rows, primaryMarkerCol, secondaryMarkerCol);
    if(runs.length===0 && fallbackMarkerCol && fallbackMarkerCol!==primaryMarkerCol) runs = computeGroupRuns(rows, fallbackMarkerCol, null);
    const markers = buildMarkerOpts(runs, days);
    if(charts[chartKey]) charts[chartKey].destroy();
    charts[chartKey] = new Chart(canvas, {
      data:{ labels:days, datasets:[
        { type:'bar', label:'Spend (₩)', data:spend, backgroundColor:'rgba(15,30,61,0.55)', yAxisID:'y', order:2 },
        { type:'line', label:'CTR', data:ctr, borderColor:'#0C8C7D', backgroundColor:'#0C8C7D', yAxisID:'y1', pointRadius:0, tension:0.25, order:1 },
        { type:'line', label:'VTR', data:vtr, borderColor:'#C2760C', backgroundColor:'#C2760C', yAxisID:'y1', pointRadius:0, tension:0.25, order:1 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:true, position:'top', labels:{boxWidth:10,font:{size:11}}}, markerLines:{markers} },
        scales:{ y:{ position:'left', ticks:{callback:v=>fmtWon(v)}, title:{display:true,text:'Spend (₩)',font:{size:10}} },
                 y1:{ position:'right', grid:{drawOnChartArea:false}, ticks:{callback:v=>v+'%'}, title:{display:true,text:'CTR / VTR',font:{size:10}} } }
      }
    });
  }catch(e){ console.error('renderTrendChart error', e); }
}

async function fetchCsv(url){
  const res = await fetch(url, {cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  if(text.trim().slice(0,15).toLowerCase().includes('<!doctype')) throw new Error('CSV가 아니라 HTML이 반환됐어요.');
  return Papa.parse(text, {header:true, skipEmptyLines:true});
}
function guessMapping(headers){
  const guesses = {
    date:['date','일자','날짜'], brand:['brand','브랜드'], country:['country','국가'], media:['media','매체'],
    objective:['objective','목적'], creativeType:['creative type','creative','소재유형'],
    influencer:['influencer','creator','인플루언서','크리에이터'], campaign:['campaign','캠페인'],
    spent:['spent','spend','지출'], impression:['impression','imps','노출'], click:['click','클릭'],
    landingPageViews:['landing page views','lpv'], view:['view','조회']
  };
  const map = {...CONFIG.fieldMap};
  Object.entries(guesses).forEach(([key,patterns])=>{
    if(map[key]) return;
    const found = headers.find(h=>patterns.some(p=>h.toLowerCase().trim()===p));
    if(found) map[key]=found;
  });
  return map;
}

  const grid = document.getElementById('mapGrid');
  grid.innerHTML = REQUIRED_FIELDS.map(f=>{
    const opts = ['<option value="">-- 선택 안함 --</option>'].concat(headers.map(h=>`<option value="${esc(h)}" ${CONFIG.fieldMap[f.key]===h?'selected':''}>${esc(h)}</option>`)).join('');
    return `<div class="field"><label>${f.label}</label><select data-map="${f.key}">${opts}</select></div>`;
  }).join('');
}
document.getElementById('testConnBtn').addEventListener('click', async ()=>{
  const url = document.getElementById('cfg-csvUrl').value.trim();
  const status = document.getElementById('connStatus');
  if(!url){ status.textContent='URL을 입력해주세요.'; status.className='status-line show error'; return; }
  status.textContent='연결 확인 중...'; status.className='status-line show';
  try{
    const parsed = await fetchCsv(url);
    const headers = parsed.meta.fields||[];
    RAWHEADERS = headers;
    RAWROWS = parsed.data.filter(r=>Object.values(r).some(v=>v!==''&&v!==null&&v!==undefined));
    CONFIG.fieldMap = guessMapping(headers);
    buildMappingUI(headers);
    document.getElementById('mappingSection').style.display='block';
    status.innerHTML = `연결 성공 — 컬럼 ${headers.length}개, 행 ${RAWROWS.length.toLocaleString()}개`;
    status.className='status-line show ok';
  }catch(e){ status.textContent='연결 실패: '+e.message; status.className='status-line show error'; }
});
document.getElementById('modalSave').addEventListener('click', ()=>{
  CONFIG.csvUrl = document.getElementById('cfg-csvUrl').value.trim();
  CONFIG.appsScriptUrl = document.getElementById('cfg-appsScriptUrl').value.trim();
  document.querySelectorAll('#mapGrid select').forEach(sel=>{ CONFIG.fieldMap[sel.dataset.map]=sel.value; });
  saveJSON(LS.config, CONFIG);
  closeSettings();
  syncData();
});

/* ===========================================================
   PDF 내보내기
=========================================================== */
document.getElementById('pdfBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('pdfBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin">📄</span> 생성 중...';
  try{
    const target = document.querySelector('.tab-panel.active');
    const canvas = await html2canvas(target, { scale:2, backgroundColor:'#ffffff' });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;
    let heightLeft = imgH, position = 0;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
    heightLeft -= pageH;
    while(heightLeft > 0){
      position = heightLeft - imgH;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
      heightLeft -= pageH;
    }
    pdf.save(`월간리뷰_${currentTab}_${toDateInput(new Date())}.pdf`);
  }catch(e){ showBanner('PDF 생성 실패: '+e.message, 'error'); }
  finally{ btn.disabled=false; btn.innerHTML='📄 PDF'; }
});

/* ===========================================================
   초기화
=========================================================== */
(async function init(){
  await loadStateFromServer();
  if(!CONFIG.csvUrl){ openSettings(); }
  else { await syncData(); }
})();
</script>
